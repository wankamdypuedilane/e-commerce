{% extends "shop/base.html" %} {% block content %} {% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
<div class="row mb-4">
  <div class="col-md-12">
    <ul id="item-list" class="list-group shadow-sm">
      <li class="list-group-item active text-center" aria-current="true">
        <h3 class="mb-0">Résumé de votre commande</h3>
      </li>
    </ul>
  </div>
</div>

<div class="row justify-content-center mt-5">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-4 text-center">Informations de livraison</h3>

        <form method="POST" class="row g-3 needs-validation">
          {% csrf_token %}
          <input type="hidden" id="items" name="items" />

          <div class="col-md-6">
            <label for="nom" class="form-label fw-bold">Nom complet</label>
            <input
              type="text"
              class="form-control"
              id="nom"
              name="nom"
              placeholder="Junior"
              required
            />
          </div>

          <div class="col-md-6">
            <label for="email" class="form-label fw-bold">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="junior@gmail.com"
              required
            />
          </div>

          <div class="col-12">
            <label for="address" class="form-label fw-bold">Adresse</label>
            <input
              type="text"
              class="form-control"
              id="address"
              name="address"
              placeholder="1234 Main St"
              required
            />
          </div>

          <div class="col-12">
            <label for="address2" class="form-label fw-bold"
              >Complément d'adresse</label
            >
            <input
              type="text"
              class="form-control"
              id="address2"
              name="address2"
              placeholder="Appartement, studio, ou étage"
            />
          </div>

          <div class="col-md-6">
            <label for="ville" class="form-label fw-bold">Ville</label>
            <input
              type="text"
              class="form-control"
              id="ville"
              name="ville"
              placeholder="Brest"
              required
            />
          </div>

          <div class="col-md-4">
            <label for="pays" class="form-label fw-bold">Pays</label>
            <select id="pays" name="pays" class="form-select">
              <option selected>France</option>

              <option>Cameroun</option>

              <option>Maroc</option>

              <option>Algerie</option>

              <option>Togo</option>

              <option>Mali</option>

              <option>Zambie</option>

              <option>Liban</option>

              <option>Bresil</option>

              <option>Argentine</option>

              <option>Allemagne</option>

              <option>Espagne</option>
            </select>
          </div>

          <div class="col-md-2">
            <label for="zipcode" class="form-label fw-bold">Code Postal</label>
            <input
              type="text"
              class="form-control"
              id="zipcode"
              name="zipcode"
              placeholder="29200"
              required
            />
          </div>
          <div class="col-md-2">
            <label for="total" class="form-label fw-bold">Total à payer</label>
            <input
              readonly
              type="text"
              class="form-control bg-light"
              id="total"
              name="total"
            />
          </div>

          <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary w-100 btn-lg">
              Confirmer la commande
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %} {% block js %}
<script type="text/javascript">
  var cartStorageKey = window.cartStorageKey || "panier_guest";
  var panier = JSON.parse(localStorage.getItem(cartStorageKey)) || {};

  function persistPanier() {
    localStorage.setItem(cartStorageKey, JSON.stringify(panier));
  }

  function renderCheckout() {
    var total = 0;
    var number = 0;
    var itemsPourDjango = [];

    $("#item-list").find("li:not(.active)").remove();

    var keys = Object.keys(panier);
    if (keys.length === 0) {
      $("#item-list").append(
        '<li class="list-group-item text-center text-muted p-3">Votre panier est vide.</li>',
      );
      $("#total").val("0.00 €");
      $("#items").val("[]");
      return;
    }

    keys.forEach(function (id) {
      var quantity = panier[id][0];
      var name = panier[id][1];
      var priceTotalArticle = panier[id][2];
      var unitPrice = priceTotalArticle / quantity;

      number += quantity;
      total += priceTotalArticle;

      itemsPourDjango.push({ id: parseInt(id), quantity: quantity });

      var itemString = `
        <li class="list-group-item p-3">
          <div class="d-flex justify-content-between align-items-start gap-3">
            <div>
              <div class="fw-bold">${name}</div>
              <small class="text-muted">Prix unitaire : ${unitPrice.toFixed(2)} €</small>
            </div>
            <div class="text-end">
              <div class="fw-bold text-success" style="font-size: 1.1em;">${priceTotalArticle.toFixed(2)} €</div>
              <div class="mt-2 d-flex gap-1 justify-content-end">
                <button type="button" class="btn btn-sm btn-outline-secondary checkout-minus" data-id="${id}">-</button>
                <span class="badge bg-primary rounded-pill align-self-center">x ${quantity}</span>
                <button type="button" class="btn btn-sm btn-outline-success checkout-plus" data-id="${id}">+</button>
                <button type="button" class="btn btn-sm btn-outline-danger checkout-remove" data-id="${id}">Supprimer</button>
              </div>
            </div>
          </div>
        </li>`;
      $("#item-list").append(itemString);
    });

    var totalLigne = `
      <li class="list-group-item d-flex justify-content-between align-items-center list-group-item-warning p-3 mt-2 shadow-sm">
        <b class="text-uppercase">Total de votre commande</b>
        <div class="text-end">
          <span class="badge bg-dark rounded-pill">Articles : ${number}</span><br>
          <span class="fw-bold text-dark" style="font-size: 1.4em;">${total.toFixed(2)} €</span>
        </div>
      </li>`;
    $("#item-list").append(totalLigne);

    $("#total").val(total.toFixed(2) + " €");
    $("#items").val(JSON.stringify(itemsPourDjango));
  }

  $(document).on("click", ".checkout-plus", function () {
    var id = this.getAttribute("data-id");
    if (!panier[id]) return;

    var unitPrice = panier[id][2] / panier[id][0];
    panier[id][0] += 1;
    panier[id][2] += unitPrice;
    persistPanier();
    renderCheckout();
  });

  $(document).on("click", ".checkout-minus", function () {
    var id = this.getAttribute("data-id");
    if (!panier[id]) return;

    var unitPrice = panier[id][2] / panier[id][0];
    panier[id][0] -= 1;
    if (panier[id][0] <= 0) {
      delete panier[id];
    } else {
      panier[id][2] -= unitPrice;
    }

    persistPanier();
    renderCheckout();
  });

  $(document).on("click", ".checkout-remove", function () {
    var id = this.getAttribute("data-id");
    if (!panier[id]) return;

    delete panier[id];
    persistPanier();
    renderCheckout();
  });

  renderCheckout();
</script>
{% endblock %}
