name: CI/CD Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Django tests
        run: python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Validate deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          [[ -n "$EC2_HOST" ]] || { echo "Missing secret: EC2_HOST"; exit 1; }
          [[ -n "$EC2_USER" ]] || { echo "Missing secret: EC2_USER"; exit 1; }
          [[ -n "$EC2_PROJECT_PATH" ]] || { echo "Missing secret: EC2_PROJECT_PATH"; exit 1; }
          [[ -n "$EC2_SSH_KEY" ]] || { echo "Missing secret: EC2_SSH_KEY"; exit 1; }
          echo "Deploy secrets look present."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add host key
        env:
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -e
          PORT="${EC2_PORT:-22}"
          ssh-keyscan -T 10 -p "$PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
        run: |
          set -e
          PORT="${EC2_PORT:-22}"
          ssh -p "$PORT" "$EC2_USER@$EC2_HOST" "
            set -e
            cd '$EC2_PROJECT_PATH'
            test -d .git
            git pull --ff-only origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart dilane-shop
            sudo systemctl restart nginx
            python manage.py check --deploy
          "
