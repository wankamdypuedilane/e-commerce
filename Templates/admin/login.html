{% extends "shop/base.html" %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body p-5">
        <h3 class="text-center mb-4 fw-bold">Connexion administration</h3>

        <form method="post" action="{{ app_path }}">
          {% csrf_token %} {% if form.non_field_errors %}
          <div class="alert alert-danger">
            {% for error in form.non_field_errors %}
            <div>{{ error }}</div>
            {% endfor %}
          </div>
          {% endif %}

          <div class="mb-3">
            <label class="form-label fw-bold" for="id_username">Email</label>
            <input
              type="email"
              name="username"
              id="id_username"
              class="form-control"
              autocomplete="email"
              required
              autofocus
            />
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold" for="id_password"
              >Mot de passe</label
            >
            <div class="password-field">
              <input
                type="password"
                name="password"
                id="id_password"
                class="form-control"
                required
              />
              <button
                type="button"
                class="password-toggle-btn toggle-password"
                data-target="id_password"
                aria-label="Afficher le mot de passe"
                title="Afficher le mot de passe"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M2.1 12C3.9 7.3 7.7 4 12 4s8.1 3.3 9.9 8c-1.8 4.7-5.6 8-9.9 8s-8.1-3.3-9.9-8Z"
                  />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          {% if next %}
          <input type="hidden" name="next" value="{{ next }}" />
          {% endif %}

          <button type="submit" class="btn btn-primary w-100 btn-lg">
            Connexion
          </button>
        </form>

        <p class="text-center mt-3 mb-0">
          <a href="{% url 'admin_password_reset' %}">Mot de passe oublié ?</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
